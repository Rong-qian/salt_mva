name: tttt_all_2class_SR_Legacy77_v1

model:
  lrs_config:
    initial: 1e-5
    max: 1e-3
    end: 1e-9
    pct_start: 0.05
    weight_decay: 1e-5 # L2 regurization

  model:
    class_path: salt.models.SaltModel
    init_args:
      init_nets:
        - input_name: concat_vector
          dense_config: &init
            output_size: &embed_dim 32
            hidden_layers: [32]
            activation: &activation ReLU
            # norm_layer: &# norm_layer LayerNorm
        - input_name: EDGE
          attach_global: True
          dense_config:
            input_size: 8 #edge + n from jets branch?
            output_size: &edge_embed_dim 64
            hidden_layers: [64]
            activation: *activation
            # norm_layer: *# norm_layer

      encoder:
        class_path: salt.models.TransformerEncoder
        init_args:
          embed_dim: *embed_dim
          edge_embed_dim: *edge_embed_dim
          num_layers: 4
          out_dim: &out_dim 128
          update_edges: True
          mha_config:
            num_heads: 8
            attention: { class_path: salt.models.ScaledDotProductAttention }
          dense_config:
            #norm_layer: *norm_layer
            activation: *activation
            dropout: &dropout 0.1

      pool_net:
        class_path: salt.models.GlobalAttentionPooling
        init_args: { input_size: *out_dim } # *out_dim + nGLOBAL

      tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: salt.models.ClassificationTask
              init_args:
                name: jets_classification
                input_name: jets
                label: flavour_label
                loss:
                  class_path: torch.nn.CrossEntropyLoss
                  init_args: { weight: [2.02, 1.0] } # this is used to change the class weight, when use_class_dict_weights: False
                dense_config: &task_dense_config
                  input_size: 131 # *out_dim + nGLOBAL
                  output_size: 2
                  hidden_layers: [128, 64, 32]
                  activation: *activation
                  dropout: *dropout

            - class_path: salt.models.VertexingTask
              init_args:
                name: Top_Reco
                input_name: concat_vector
                label: originIndexTop
                weight: 0.2
                loss:
                  class_path: torch.nn.BCEWithLogitsLoss
                  init_args:
                    reduction: none
                    #weight: [1.0,2.31,2.24,2.58,3.71]
                dense_config:
                  input_size: 323
                  output_size: 1
                  context_size: 64
                  hidden_layers: [128, 64, 32]
                  activation: *activation
                  dropout: *dropout

data:
  input_map:
    GLOBAL: jets
    jets: jets
    concat_vector: concat_vector
    EDGE: concat_vector
  variables:
    GLOBAL:
      - nJets
      - nBTags_GN2v00LegacyWP_77
      - HT_all
    jets:
      - met_met
      - met_phi
    concat_vector:
      - pt
      - eta
      - phi
      - e
      - PCBT
      - charge
      - isTight
      - DFCommonAddAmbiguity
      - ID
    EDGE:
      - dR
      - z
      - kt
      - deta
      - dphi
      - msquare

  train_file: 
  val_file: 
  norm_dict: 
  class_dict: 

  batch_size: 512
  num_workers: 40

trainer:
  max_epochs: 25
  accelerator: gpu
  devices: 1
  precision: 16-mixed

